<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orenji Habit | Dashboard</title>
    <link rel="icon" href="assets/logo-clean.png">
  <link rel="stylesheet" href="../../Orenji-styles/css/variables.css">
  <link rel="stylesheet" href="../../Orenji-styles/css/core.css">
  <link rel="stylesheet" href="../../Orenji-styles/css/layout.css">
  <link rel="stylesheet" href="../../Orenji-styles/css/components.css">
  <link rel="stylesheet" href="../../Orenji-styles/css/themes.css">
  <link rel="stylesheet" href="../../Orenji-styles/css/animations.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-app="habit" data-page="dashboard">
    <header class="main-header">
        <div class="container header-row">
            <a class="brand" href="index.html"><span class="brand-mark"><img src="assets/logo-clean.png" alt="" aria-hidden="true"></span><span>Orenji Habit</span></a>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="tasks.html">Tarefas</a>
                <a href="configuracoes.html">Configuracoes</a>
            </nav>
            <button class="icon-button" data-theme-toggle aria-label="Alternar tema">◐</button>
        </div>
    </header>

    <main class="container page-section">
        <section class="dashboard-grid">
            <article class="glass-card">
                <div class="section-header compact">
                    <span class="eyebrow">Novo habito</span>
                    <h1>Gestao diaria</h1>
                </div>
                <form class="habit-form" data-habit-form>
                    <input type="hidden" name="id">
                    <label>Nome<input type="text" name="name" placeholder="Ex: Ler 10 paginas" required></label>
                    <label>Metodo de habito
                        <select name="method" data-habit-method></select>
                    </label>
                    <label>Metodo de foco ligado
                        <select name="linkedFocusMethod" data-linked-focus-method></select>
                    </label>
                    <label>Categoria
                        <select name="category">
                            <option value="saude">Saude</option>
                            <option value="estudo">Estudo</option>
                            <option value="fitness">Fitness</option>
                            <option value="produtividade">Produtividade</option>
                            <option value="pessoal">Pessoal</option>
                        </select>
                    </label>
                    <button class="button" type="submit">Guardar habito</button>
                </form>
            </article>

            <aside class="stats-grid" data-stats></aside>
        </section>

        <section class="glass-card secondary-panel">
            <div class="section-header compact">
                <h2>Criar metodo de habito</h2>
                <p>Guarda uma abordagem propria para criar consistencia.</p>
            </div>
            <form class="custom-method-form" data-custom-habit-form>
                <input type="text" name="name" placeholder="Nome do metodo" required>
                <input type="text" name="frequency" placeholder="Frequencia" required>
                <input type="text" name="objective" placeholder="Objetivo" required>
                <button class="button" type="submit">Guardar metodo</button>
            </form>
        </section>

        <section class="glass-card secondary-panel">
            <div class="section-header compact">
                <h2>Progresso vindo do Focus</h2>
                <p>Sessoes de foco que completaram habitos automaticamente.</p>
            </div>
            <div class="session-list" data-focus-contributions></div>
            <a class="button button-secondary wide-link" href="../Orenji%20Focus/dashboard.html">Abrir Focus</a>
        </section>

        <section class="habit-list" data-habit-list></section>
    </main>

    <script src="../../Orenji-styles/js/theme.js"></script>
    <script src="js/theme.js"></script>
    <script src="../Orenji%20Shared/js/integration.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
