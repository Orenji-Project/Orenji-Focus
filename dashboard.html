<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orenji Focus | Dashboard</title>
    <link rel="icon" href="assets/logo-clean.png">
  <link rel="stylesheet" href="../Orenji-styles/css/variables.css">
  <link rel="stylesheet" href="../Orenji-styles/css/core.css">
  <link rel="stylesheet" href="../Orenji-styles/css/layout.css">
  <link rel="stylesheet" href="../Orenji-styles/css/components.css">
  <link rel="stylesheet" href="../Orenji-styles/css/themes.css">
  <link rel="stylesheet" href="../Orenji-styles/css/animations.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-app="focus" data-page="dashboard">
    <header class="main-header">
        <div class="container header-row">
            <a class="brand" href="index.html"><span class="brand-mark"><img src="assets/logo-clean.png" alt="" aria-hidden="true"></span><span>Orenji Focus</span></a>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="sessoes.html">Sessoes</a>
                <a href="tasks.html">Tarefas</a>
                <a href="configuracoes.html">Configuracoes</a>
            </nav>
            <button class="icon-button" data-theme-toggle aria-label="Alternar tema">◐</button>
        </div>
    </header>

    <main class="container page-section">
        <section class="dashboard-grid">
            <article class="timer-card glass-card" data-focus-shell>
                <div class="section-header">
                    <span class="eyebrow" data-method-label>Método de foco:</span>
                    <h1 data-timer-state>Pomodoro 25/5</h1>
                </div>
                <div class="timer-display" data-timer-display>25:00</div>
                <form class="method-picker themed-picker" data-focus-method-form>
                    <label class="timer-select-card">Metodo de foco
                        <select name="method" data-focus-method></select>
                    </label>
                </form>
                <div class="focus-mode-summary" data-focus-mode-summary></div>
                <div class="timer-actions">
                    <button class="button" data-timer-start>Iniciar</button>
                    <button class="button button-secondary" data-timer-pause>Pausar</button>
                    <button class="button button-ghost" data-timer-reset>Resetar</button>
                </div>
                <label class="focus-toggle"><input type="checkbox" data-focus-mode> Focus Mode</label>
            </article>

        </section>

        <section class="glass-card secondary-panel">
            <div class="section-header compact">
                <h2>Criar metodo de foco</h2>
                <p>Define um ritmo proprio para estudar, trabalhar ou recuperar energia.</p>
            </div>
            <form class="custom-method-form" data-custom-focus-form>
                <input type="text" name="name" placeholder="Nome do metodo" required>
                <input type="number" name="focusMinutes" min="1" max="240" value="25" aria-label="Minutos de foco" required>
                <input type="number" name="breakMinutes" min="0" max="120" value="5" aria-label="Minutos de pausa" required>
                <input type="number" name="cycles" min="1" max="12" value="1" aria-label="Ciclos" required>
                <button class="button" type="submit">Guardar metodo</button>
            </form>
        </section>

        <section class="glass-card secondary-panel">
            <div class="section-header compact">
                <h2>Sessoes concluidas</h2>
                <p>Historico guardado localmente neste dispositivo.</p>
            </div>
            <div class="session-list" data-session-list></div>
        </section>
    </main>

    <script src="../Orenji-styles/js/theme.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
