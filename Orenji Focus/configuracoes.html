<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orenji Focus | Configuracoes</title>
  <link rel="stylesheet" href="../../Orenji%20core/css/variables.css">
  <link rel="stylesheet" href="../../Orenji%20core/css/core.css">
  <link rel="stylesheet" href="../../Orenji%20core/css/layout.css">
  <link rel="stylesheet" href="../../Orenji%20core/css/components.css">
  <link rel="stylesheet" href="../../Orenji%20core/css/themes.css">
  <link rel="stylesheet" href="../../Orenji%20core/css/animations.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-app="focus" data-page="settings">
    <header class="main-header">
        <div class="container header-row">
            <a class="brand" href="index.html"><span class="brand-mark">OF</span><span>Orenji Focus</span></a>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="configuracoes.html">Configuracoes</a>
            </nav>
            <button class="icon-button" data-theme-toggle aria-label="Alternar tema">◐</button>
        </div>
    </header>

    <main class="container page-section narrow">
        <section class="glass-card">
            <span class="eyebrow">Preferencias</span>
            <h1>Configuracoes do Focus</h1>
            <form class="settings-form" data-settings-form>
                <label>Nome do estudante<input type="text" name="studentName" placeholder="Orenji Student"></label>
                <label>Tema
                    <select name="theme">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </label>
                <label class="theme-sync-control">
                    <span>
                        <strong>Sincronizar tema entre apps</strong>
                        <small>Quando ativo, todas as apps Orenji usam o mesmo tema.</small>
                    </span>
                    <input type="checkbox" name="themeSync">
                </label>
                <button class="button" type="submit">Guardar</button>
            </form>
        </section>
    </main>

    <script src="../../Orenji%20core/js/theme.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
